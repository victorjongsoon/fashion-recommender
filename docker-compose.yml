services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_AGENT_SERVICE_URL=http://agent-service:8004   # ← added

  image-service:
    build:
      context: ./services/image-service
    environment:
      IMAGES_DIR: /data/images
    volumes:
      - ./data/raw/images:/data/images:ro
    ports:
      - "8001:8000"

  vton-service:
    build: ./services/vton-services
    ports:
      - "8002:8000"
    environment:
      HF_TOKEN: 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

  recommender-service:
    build:
      context: ./services/recommender-service
    ports:
      - "8003:8000"
    environment:
      NEO4J_URI: bolt://kg-service:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      DATA_DIR: /data
    volumes:
      - ./data:/data:ro
      - ./services/recommender-service/kg:/app/kg:ro
    depends_on:
      - kg-service

  weather-service:
    build:
      context: ./services/weather-service
    ports:
      - "8005:8000"

  kg-service:
    image: neo4j:latest
    environment:
      - NEO4J_AUTH=neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j_data:/data

  # ── Added by Joshua ────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  agent-service:
    build:
      context: ./services/agent-service
    container_name: agent-service
    ports:
      - "8004:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - WEATHER_SERVICE_URL=http://weather-service:8000
    restart: unless-stopped

volumes:
  ollama_models:
    name: fashion-recommender-ollama-models
